name: Lifehug
options:
  bundleIdPrefix: com.lifehug
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete

packages:
  mlx-swift-lm:
    url: https://github.com/ml-explore/mlx-swift-lm
    from: "2.30.0"
  kokoro-ios:
    path: LocalPackages/kokoro-ios
  MisakiSwift:
    path: LocalPackages/MisakiSwift
  MLXUtilsLibrary:
    url: https://github.com/mlalma/MLXUtilsLibrary.git
    exactVersion: "0.0.6"

targets:
  Lifehug:
    type: application
    platform: iOS
    sources:
      - path: Lifehug
        excludes:
          - "**/*.md"
      - path: Lifehug/Resources/question-bank.md
        type: file
        buildPhase: resources
      - path: Lifehug/Resources/Assets.xcassets
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_FILE: Lifehug/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.lifehugapp.ios
        CODE_SIGN_ENTITLEMENTS: Lifehug/Lifehug.entitlements
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: PJHS9XQS6H
        MARKETING_VERSION: "1.2.0"
        CURRENT_PROJECT_VERSION: 12
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: mlx-swift-lm
        product: MLXLLM
      - package: mlx-swift-lm
        product: MLXLMCommon
      - package: kokoro-ios
        product: KokoroSwift
      - package: MLXUtilsLibrary
        product: MLXUtilsLibrary
    entitlements:
      path: Lifehug/Lifehug.entitlements
      properties:
        com.apple.developer.kernel.increased-memory-limit: true
    preBuildScripts: []

  LifehugTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: LifehugTests
    dependencies:
      - target: Lifehug
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lifehugapp.ios.tests
        GENERATE_INFOPLIST_FILE: YES
